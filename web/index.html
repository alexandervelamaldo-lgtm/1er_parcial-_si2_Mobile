<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Emergency Vehicular">
  <meta name="theme-color" content="#2563EB">
  <meta name="description" content="Asistencia de emergencia vehicular — disponible en línea y offline">

  <!-- Favicon / icons -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>Emergency Vehicular</title>

  <style>
    /* Splash screen shown while Flutter initialises */
    body {
      margin: 0;
      background-color: #f8faff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading {
      text-align: center;
      color: #2563EB;
    }
    #loading svg {
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Shown until Flutter mounts -->
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2">
      <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
    </svg>
    <p style="margin-top:16px;font-size:14px;opacity:0.7">Cargando…</p>
  </div>

  <script>
    // Register the PWA service worker.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/flutter_service_worker.js')
          .then((reg) => {
            console.log('[SW] Registered, scope:', reg.scope);
          })
          .catch((err) => {
            console.warn('[SW] Registration failed:', err);
          });
      });
    }
  </script>

  <!-- Flutter web bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
