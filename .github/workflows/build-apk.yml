# Compila el APK release del móvil en un runner Linux de GitHub Actions.
#
# Se dispara automáticamente en cada push a main y también podés lanzarlo
# manualmente desde la UI (tab "Actions" del repo).
#
# Salida: el APK queda como artifact "app-release-apk" en la corrida —
# descargable desde el resumen del run, se guarda 30 días. Instalá el
# APK en tu Android habilitando "Fuentes desconocidas".

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      # Nota: MAPBOX_ACCESS_TOKEN es un "public token" (pk.*) diseñado para ir
      # embebido en clientes móviles/web; igual lo tratamos como secret para
      # que no quede en el código y podamos rotarlo sin tocar el repo.
      # Si no lo configurás, el build igual pasa pero los mapas no cargan.
      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://emergency-backend-ea41.onrender.com \
            --dart-define=ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            --dart-define=MAPBOX_STYLE_URI=mapbox://styles/mapbox/standard

      - name: Rename APK for clarity
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/emergency-mobile-${{ github.sha }}.apk
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/emergency-mobile-latest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/*.apk
          retention-days: 30
          if-no-files-found: error
