name: emergency_mobile
description: Aplicación móvil para clientes del sistema de asistencia de emergencia vehicular.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  http_parser: ^4.1.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  mapbox_maps_flutter: ^2.24.2
  latlong2: ^0.9.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  open_filex: ^4.7.0
  path_provider: ^2.1.4
  record: ^6.2.0
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  flutter_tts: ^4.2.0
  pdf: ^3.12.0
  excel: ^4.0.0     # 2.x usa Android v1 embedding (deprecated) — 4.x lo elimina
  webview_flutter: ^4.10.0
  # Connectivity monitoring
  connectivity_plus: ^6.1.4
  # Local SQLite for offline queue (emergencias sin conexión)
  sqflite: ^2.3.3
  path: ^1.9.0
  # Idempotency keys for offline sync (POST /sync/lote)
  uuid: ^4.5.1
  # KPI charts
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
