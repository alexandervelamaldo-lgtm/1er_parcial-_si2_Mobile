# JVM memory tuned for the Flutter + Firebase + Mapbox dependency graph.
# -Xmx4g avoids OOM in the R8 minification step which is heavy with these libs.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError

# Required for Flutter and any modern Android dep. Don't disable.
android.useAndroidX=true
android.enableJetifier=true
