# JVM memory tuned for the Flutter + Firebase + Mapbox dependency graph.
# -Xmx4g avoids OOM in the R8 minification step which is heavy with these libs.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true

# Windows: Gradle abre un socket loopback para su daemon interno; si
# firewall/antivirus/IPv6 lo bloquean, aparece "Unable to establish
# loopback connection". Desactivamos el daemon para evitar ese socket.
# Cuesta ~10s más de arranque por build, pero funciona.
org.gradle.daemon=false

# Required for Flutter and any modern Android dep. Don't disable.
android.useAndroidX=true
android.enableJetifier=true
